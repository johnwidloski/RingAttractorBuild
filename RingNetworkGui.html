<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ring Attractor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 16px;
}

/* ── Left panel ─────────────────────────────────────────────── */
#controls {
  width: 555px;
  min-width: 220px;
  flex-shrink: 0;
  background: #161b22;
  border-right: 1px solid #30363d;
  padding: 12px 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Resizer (drag handle between panel and plots) ───────────── */
#resizer {
  flex: 0 0 6px;
  cursor: col-resize;
  background: #30363d;
  transition: background 0.15s;
}
#resizer:hover, #resizer.dragging { background: #58a6ff; }
body.resizing { cursor: col-resize; user-select: none; }

/* ── Right panel ─────────────────────────────────────────────── */
#plots {
  flex: 1;
  display: flex;
  flex-direction: row;
  padding: 6px 6px 6px 8px;
  gap: 8px;
  overflow: hidden;
  background: #0d1117;
}
#plots-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
  overflow: hidden;
  flex: 1;
  min-width: 0;
}
/* Right column: the square mean-weight plot, aligned to the top so it sits
   beside the Weights plot; the space below it is left empty. This keeps the
   Weights / Firing-rates / Inputs plots in one full-width stack so their
   x-axes line up. */
#phase-col {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  min-height: 0;
  flex: 0 0 auto;
}
/* height + width set by sizePhaseSquare(): square, matching the Weights plot */
#phase-wrap { flex: 0 0 auto; }
.plot-wrap { flex: 1; position: relative; min-height: 0; }

/* ── 2D heatmaps ─────────────────────────────────────────────── */
#rate-2d { gap: 12px; align-items: center; justify-content: center; }
#inputs-2d { display: flex; flex-direction: column; gap: 4px; height: 100%; width: 100%; }
.hm-row { display: flex; flex-direction: row; gap: 6px; min-height: 0; height: 100%; align-items: center; justify-content: center; }
#inputs-2d .hm-row { flex: 1; }
.hm { position: relative; height: 100%; aspect-ratio: 1 / 1; }
.hm canvas {
  width: 100%; height: 100%; display: block;
  background: #0d1117; image-rendering: pixelated;
  border: 1px solid #21262d;
}
.hm-lbl {
  position: absolute; top: 2px; left: 4px;
  font-size: 11px; color: #e6edf3; pointer-events: none;
  text-shadow: 0 0 3px #000, 0 0 3px #000;
}
.hm-empty { visibility: hidden; }

/* ── Start / Stop button ─────────────────────────────────────── */
#startstop {
  width: 100%;
  padding: 9px 0;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}
#startstop.running {
  background: #b91c1c;
  color: #fecaca;
}
#startstop.stopped {
  background: #15803d;
  color: #bbf7d0;
}
#resetbtn {
  width: 100%;
  padding: 9px 0;
  border: 1px solid #30363d;
  border-radius: 6px;
  background: #21262d;
  color: #8b949e;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}
#resetbtn:hover {
  background: #30363d;
  color: #c9d1d9;
}

/* ── Section headers ─────────────────────────────────────────── */
.sec-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #58a6ff;
  border-bottom: 1px solid #21262d;
  padding-bottom: 4px;
  margin-bottom: 8px;
}

/* ── Generic control row ─────────────────────────────────────── */
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.lbl {
  color: #8b949e;
  white-space: nowrap;
  min-width: 70px;
  font-size: 15px;
}

/* ── Range sliders ───────────────────────────────────────────── */
input[type=range] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #21262d;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #58a6ff;
  cursor: pointer;
}
.sval {
  font-size: 13px;
  color: #6e7681;
  min-width: 42px;
  text-align: right;
}

/* ── Toggle switches ─────────────────────────────────────────── */
.tog { position: relative; display: inline-block; width: 32px; height: 18px; }
.tog input { opacity: 0; width: 0; height: 0; }
.tog-track {
  position: absolute; cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #21262d; border-radius: 18px; transition: .2s;
}
.tog-track::before {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  left: 3px; bottom: 3px;
  background: #6e7681;
  border-radius: 50%;
  transition: .2s;
}
input:checked ~ .tog-track { background: #238636; }
input:checked ~ .tog-track::before {
  transform: translateX(14px);
  background: #3fb950;
}

/* ── Weights table ───────────────────────────────────────────── */
.wt { width: 100%; border-collapse: collapse; }
.wt th {
  font-size: 12px; color: #6e7681;
  text-align: center; padding: 2px 2px 5px;
  font-weight: 400;
}
.wt th:first-child { text-align: left; }
.wt td { padding: 4px 3px; vertical-align: middle; }
.wt td:first-child {
  font-size: 14px; color: #8b949e;
  white-space: nowrap; padding-right: 6px;
}
.wt td input[type=range] { width: 100%; min-width: 50px; }
.wt .sval { min-width: 36px; font-size: 12px; }

/* Match the weight-table value readouts (size + spacing) for the
   standalone sliders: Neurons, β_E, β_I, w_a, τ_a */
#n_val, #beta_E_val, #beta_I_val, #amp_a_val, #tau_a_val {
  min-width: 36px;
  font-size: 12px;
}

/* ── Presets ─────────────────────────────────────────────────── */
input[type=text]#preset_name {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 4px;
  color: #c9d1d9;
  padding: 6px 8px;
  font-size: 14px;
  outline: none;
}
input[type=text]#preset_name:focus { border-color: #58a6ff; }
.preset-row {
  display: flex;
  gap: 4px;
  margin-bottom: 4px;
}
.preset-btn {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid #30363d;
  border-radius: 4px;
  background: #21262d;
  color: #c9d1d9;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.preset-btn:hover { background: #30363d; }
.preset-del {
  width: 30px;
  padding: 0;
  border: 1px solid #30363d;
  border-radius: 4px;
  background: #21262d;
  color: #8b949e;
  font-size: 14px;
  cursor: pointer;
  line-height: 1;
}
.preset-del:hover { background: #b91c1c; color: #fecaca; border-color: #b91c1c; }
.preset-action {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid #30363d;
  border-radius: 4px;
  background: #21262d;
  color: #8b949e;
  font-size: 13px;
  cursor: pointer;
}
.preset-action:hover { background: #30363d; color: #c9d1d9; }
</style>

<!-- ══ Worker source (not executed directly) ════════════════════ -->
<script id="worker-src" type="text/plain">

// ── FFT (Cooley-Tukey, power-of-2) ───────────────────────────────────
function fft(re, im) {
  const n = re.length;
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      let t = re[i]; re[i] = re[j]; re[j] = t;
      t = im[i]; im[i] = im[j]; im[j] = t;
    }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wRe = Math.cos(ang), wIm = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let cRe = 1, cIm = 0;
      for (let k = 0; k < (len >> 1); k++) {
        const p = i + k, q = p + (len >> 1);
        const uRe = re[p], uIm = im[p];
        const vRe = re[q]*cRe - im[q]*cIm;
        const vIm = re[q]*cIm + im[q]*cRe;
        re[p] = uRe+vRe; im[p] = uIm+vIm;
        re[q] = uRe-vRe; im[q] = uIm-vIm;
        const nr = cRe*wRe - cIm*wIm;
        cIm = cRe*wIm + cIm*wRe; cRe = nr;
      }
    }
  }
}

function ifft(re, im) {
  const n = im.length;
  for (let i = 0; i < n; i++) im[i] = -im[i];
  fft(re, im);
  for (let i = 0; i < n; i++) { re[i] /= n; im[i] = -im[i] / n; }
}

function fftshift(arr) {
  const n = arr.length, s = Math.floor(n / 2);
  const r = new Float64Array(n);
  for (let i = 0; i < n - s; i++) r[i] = arr[i + s];
  for (let i = 0; i < s; i++) r[n - s + i] = arr[i];
  return r;
}

// ── 2D FFT (row–column, power-of-2 side L) ───────────────────────────
let ftBufRe = null, ftBufIm = null;   // reusable length-L scratch (2D mode)
function fft2(re, im, L) {
  for (let y = 0; y < L; y++) {
    const off = y * L;
    for (let x = 0; x < L; x++) { ftBufRe[x] = re[off + x]; ftBufIm[x] = im[off + x]; }
    fft(ftBufRe, ftBufIm);
    for (let x = 0; x < L; x++) { re[off + x] = ftBufRe[x]; im[off + x] = ftBufIm[x]; }
  }
  for (let x = 0; x < L; x++) {
    for (let y = 0; y < L; y++) { ftBufRe[y] = re[y * L + x]; ftBufIm[y] = im[y * L + x]; }
    fft(ftBufRe, ftBufIm);
    for (let y = 0; y < L; y++) { re[y * L + x] = ftBufRe[y]; im[y * L + x] = ftBufIm[y]; }
  }
}
function ifft2(re, im, L) {
  const M = L * L;
  for (let k = 0; k < M; k++) im[k] = -im[k];
  fft2(re, im, L);
  for (let k = 0; k < M; k++) { re[k] /= M; im[k] = -im[k] / M; }
}
function fftshift2(arr, L) {
  const s = Math.floor(L / 2);
  const r = new Float64Array(L * L);
  for (let y = 0; y < L; y++) {
    const yy = (y + s) % L;
    for (let x = 0; x < L; x++) r[y * L + x] = arr[yy * L + ((x + s) % L)];
  }
  return r;
}

// ── Simulation state ──────────────────────────────────────────────────
let N = 0, params = null;
let D = 1, L = 0;   // dimensionality (1 or 2) and side length (2D torus is L×L = N)
let r_E = null, r_I = null;
let wFT = {};       // { EE, IE, EI, II } each { re, im, vec }
let wkRe, wkIm;    // reusable FFT work buffers
// pre-alloc output buffers
let g_EE, g_IE, g_EI, g_II, G_E, G_I;
let a_E, g_adapt;   // E-cell adaptation variable and its current (-w_a·a)
let pulseBlob;      // precomputed Gaussian drive at center for periodic resets
let resetElapsed = 0, silenceRemaining = 0, pulseRemaining = 0;   // reset timer / silence / pulse countdowns (s)

let running = false;
let pendingParams = null, paramsDirty = false;

const dt = 0.5 / 1000;
const tau_s = 30 / 1000;
const STEPS_PER_TICK = 200;   // simulation steps between UI posts (1D)
const STEPS_2D = 20;          // fewer steps/tick in 2D (2D FFTs are heavier)

// Periodic reset pulse: brief strong Gaussian drive at the ring centre.
const SILENCE_DUR = 0.5;      // s — activity silenced just before each reset pulse
const PULSE_DUR = 0.050;      // s — how long the pulse is held (50 ms)
const PULSE_AMP = 5000;       // peak excitatory drive added to G_E at centre
const PULSE_SIG_FRAC = 1/16;  // Gaussian width as a fraction of N

// ── Weight helpers ────────────────────────────────────────────────────
function makeWeightVec(n, sig, amp, inv, bin) {
  const w = new Float64Array(n);
  const ctr = (Math.floor(n / 2) + 1) / n;
  let mx = 0;
  for (let i = 0; i < n; i++) {
    const d = ((i + 1) / n - ctr) / sig;
    w[i] = Math.exp(-0.5 * d * d);
    if (w[i] > mx) mx = w[i];
  }
  for (let i = 0; i < n; i++) {
    w[i] /= mx;
    if (inv) w[i] = 1 - w[i];
    if (bin) w[i] = w[i] >= 0.5 ? 1 : 0;
    w[i] *= amp;
  }
  return w;
}

function computeWeightFT(w) {
  const n = w.length;
  const ws = fftshift(w);
  const re = new Float64Array(ws);
  const im = new Float64Array(n);
  fft(re, im);
  return { re, im };
}

// 2D isotropic Gaussian kernel (peak 1 at the centre pixel), same options
// as makeWeightVec; returned row-major, length L*L.
function makeWeightVec2D(L, sig, amp, inv, bin) {
  const w = new Float64Array(L * L);
  const ctr = (Math.floor(L / 2) + 1) / L;
  let mx = 0;
  for (let y = 0; y < L; y++) {
    const py = (y + 1) / L - ctr;
    for (let x = 0; x < L; x++) {
      const px = (x + 1) / L - ctr;
      const v = Math.exp(-0.5 * (px * px + py * py) / (sig * sig));
      w[y * L + x] = v;
      if (v > mx) mx = v;
    }
  }
  for (let k = 0; k < w.length; k++) {
    w[k] /= mx;
    if (inv) w[k] = 1 - w[k];
    if (bin) w[k] = w[k] >= 0.5 ? 1 : 0;
    w[k] *= amp;
  }
  return w;
}

function computeWeightFT2(w, L) {
  const ws = fftshift2(w, L);
  const re = new Float64Array(ws);
  const im = new Float64Array(L * L);
  fft2(re, im, L);
  return { re, im };
}

function initWeights(p) {
  if (D === 2) {
    const env = makeWeightVec2D(L, p.sig_env, 1.0, false, false);
    for (const nm of ['EE','EI','IE','II']) {
      const vec = makeWeightVec2D(L, p['sig_'+nm], p['amp_'+nm], p['inv_'+nm], p['bin_'+nm]);
      for (let k = 0; k < vec.length; k++) vec[k] *= env[k];
      const ft = computeWeightFT2(vec, L);
      wFT[nm] = { re: ft.re, im: ft.im, vec };
    }
  } else {
    const env = makeWeightVec(N, p.sig_env, 1.0, false, false);
    for (const nm of ['EE','EI','IE','II']) {
      const vec = makeWeightVec(N, p['sig_'+nm], p['amp_'+nm], p['inv_'+nm], p['bin_'+nm]);
      for (let i = 0; i < N; i++) vec[i] *= env[i];
      const ft  = computeWeightFT(vec);
      wFT[nm] = { re: ft.re, im: ft.im, vec };
    }
  }
}

function allocBuffers(n) {
  wkRe = new Float64Array(n); wkIm = new Float64Array(n);
  g_EE = new Float64Array(n); g_IE = new Float64Array(n);
  g_EI = new Float64Array(n); g_II = new Float64Array(n);
  G_E  = new Float64Array(n); G_I  = new Float64Array(n);
  r_E  = new Float64Array(n); r_I  = new Float64Array(n);
  a_E  = new Float64Array(n); g_adapt = new Float64Array(n);
  pulseBlob = new Float64Array(n);

  if (D === 2) {
    const c = Math.floor(L / 2);
    r_E[c * L + c] = 1; // seed bump at centre pixel
  } else {
    const c = Math.floor(n / 2);
    r_E[Math.max(0, c - 1)] = 1; // seed bump
  }
  buildPulseBlob();
  // each run: silence → centre pulse
  resetElapsed = 0; silenceRemaining = SILENCE_DUR;
  pulseRemaining = params ? params.pulse_dur : PULSE_DUR;
}

// Fill the reset-pulse drive from the current params (amplitude + Gaussian
// width as a fraction of N). Rebuilt whenever those sliders change, so the
// pulse shape updates without re-seeding the bump.
function buildPulseBlob() {
  if (!pulseBlob) return;
  const amp = params ? params.pulse_amp : PULSE_AMP;
  const sigFrac = params ? params.pulse_sig_frac : PULSE_SIG_FRAC;
  if (D === 2) {
    const c = Math.floor(L / 2);
    const sig = Math.max(1, L * sigFrac);
    for (let y = 0; y < L; y++) {
      const dy = y - c;
      for (let x = 0; x < L; x++) {
        const dx = x - c;
        pulseBlob[y * L + x] = amp * Math.exp(-0.5 * (dx * dx + dy * dy) / (sig * sig));
      }
    }
  } else {
    const c = Math.floor(N / 2);
    const sig = Math.max(1, N * sigFrac);
    for (let i = 0; i < N; i++) {
      const dd = i - c;
      pulseBlob[i] = amp * Math.exp(-0.5 * (dd / sig) * (dd / sig));
    }
  }
}

function applyParams(p) {
  const dims = p.dims || 1;
  const side = (dims === 2) ? Math.min(p.n, 128) : p.n;
  const newN = (dims === 2) ? side * side : side;
  const resize = newN !== N || dims !== D;
  D = dims; L = side; N = newN;
  if (D === 2) { ftBufRe = new Float64Array(L); ftBufIm = new Float64Array(L); }
  params = p;
  initWeights(p);
  if (resize || r_E === null) allocBuffers(N);
  else buildPulseBlob();   // pulse-only changes: rebuild shape without re-seeding
}

// ── Convolution (in-place, uses wkRe/wkIm) ───────────────────────────
// writes result real-part into `out`
function circConvInto(sig, kRe, kIm, out) {
  out.set(sig);
  wkIm.fill(0);
  fft(out, wkIm);
  for (let i = 0; i < N; i++) {
    const a = out[i], b = wkIm[i], c = kRe[i], d = kIm[i];
    out[i] = a*c - b*d; wkIm[i] = a*d + b*c;
  }
  ifft(out, wkIm);
}

function circConvInto2D(sig, kRe, kIm, out) {
  out.set(sig);
  wkIm.fill(0);
  fft2(out, wkIm, L);
  for (let i = 0; i < N; i++) {
    const a = out[i], b = wkIm[i], c = kRe[i], d = kIm[i];
    out[i] = a*c - b*d; wkIm[i] = a*d + b*c;
  }
  ifft2(out, wkIm, L);
}

// ── Poisson sampler ───────────────────────────────────────────────────
function poissonSample(lam) {
  if (lam <= 0) return 0;
  if (lam > 20) {
    // Normal approximation
    const u = Math.random(), v = Math.random();
    const z = Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
    return Math.max(0, Math.round(lam + Math.sqrt(lam) * z));
  }
  const L = Math.exp(-lam); let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

// ── Main simulation tick ──────────────────────────────────────────────
function tick() {
  if (!running) return;

  if (paramsDirty && pendingParams) {
    applyParams(pendingParams);
    pendingParams = null; paramsDirty = false;
  }
  if (!r_E) { setTimeout(tick, 10); return; }

  const sp = params.spiking;
  const adaptOn = params.adapt, wa = params.w_a, tauA = params.tau_a;
  const resetOn = params.reset, tReset = params.t_reset;
  const conv = (D === 2) ? circConvInto2D : circConvInto;
  // Playback speed scales sim-time advanced per rendered frame: <1 = slow-mo,
  // >1 = fast-forward (more steps/tick).
  const baseSteps = (D === 2) ? STEPS_2D : STEPS_PER_TICK;
  const steps = Math.max(1, Math.round(baseSteps * (params.speed || 1)));

  for (let s = 0; s < steps; s++) {
    // Periodic reset: every T_reset, silence briefly, then fire a centre pulse.
    if (resetOn) {
      resetElapsed += dt;
      if (resetElapsed >= tReset) {
        silenceRemaining = SILENCE_DUR; pulseRemaining = params.pulse_dur; resetElapsed = 0;
      }
    }

    // Silence phase: zero all activity (adaptation keeps evolving — only decays,
    // it is not reset). Runs before the pulse on every reset and at start-of-run.
    if (silenceRemaining > 0) {
      silenceRemaining -= dt;
      for (let i = 0; i < N; i++) {
        r_E[i] = 0; r_I[i] = 0;
        g_EE[i] = 0; g_IE[i] = 0; g_EI[i] = 0; g_II[i] = 0;
        G_E[i] = 0;  G_I[i] = 0;
        if (adaptOn) a_E[i] -= a_E[i] * dt / tauA;
      }
      continue;
    }

    // an active pulse always fires (start-of-run or periodic reset), after silence
    const pulsing = pulseRemaining > 0;

    conv(r_E, wFT.EE.re, wFT.EE.im, g_EE);
    conv(r_E, wFT.IE.re, wFT.IE.im, g_IE);
    conv(r_I, wFT.EI.re, wFT.EI.im, g_EI);
    conv(r_I, wFT.II.re, wFT.II.im, g_II);

    const bE = params.beta_E, bI = params.beta_I;
    for (let i = 0; i < N; i++) {
      G_E[i] = g_EE[i] + g_EI[i] + bE - (adaptOn ? wa * a_E[i] : 0) + (pulsing ? pulseBlob[i] : 0);
      G_I[i] = g_IE[i] + g_II[i] + bI;
    }
    for (let i = 0; i < N; i++) {
      const fE = G_E[i] > 0 ? G_E[i] : 0;
      const fI = G_I[i] > 0 ? G_I[i] : 0;
      const sE = sp ? poissonSample(fE * dt) : fE * dt;
      const sI = sp ? poissonSample(fI * dt) : fI * dt;
      r_E[i] += sE - r_E[i] * dt / tau_s;
      r_I[i] += sI - r_I[i] * dt / tau_s;
      if (adaptOn) a_E[i] += sE - a_E[i] * dt / tauA;
    }
    if (pulsing) pulseRemaining -= dt;
  }
  // adaptation current for plotting (only displayed when enabled)
  for (let i = 0; i < N; i++) g_adapt[i] = -wa * a_E[i];

  // Divergence guard: reset if NaN/Inf
  let ok = true;
  for (let i = 0; i < N; i++) {
    if (!isFinite(r_E[i]) || !isFinite(r_I[i])) { ok = false; break; }
  }
  if (!ok) allocBuffers(N);

  // 1D → plain arrays (consumed by Chart.js); 2D → Float32Array (heatmaps).
  const pack = (D === 2) ? (a => new Float32Array(a)) : (a => Array.from(a));
  self.postMessage({
    type: 'update', n: N, dims: D, L: L,
    r_E:  pack(r_E),  r_I:  pack(r_I),
    g_EE: pack(g_EE), g_IE: pack(g_IE),
    g_EI: pack(g_EI), g_II: pack(g_II),
    G_E:  pack(G_E),  G_I:  pack(G_I),
    w_EE: pack(wFT.EE.vec), w_IE: pack(wFT.IE.vec),
    w_EI: pack(wFT.EI.vec), w_II: pack(wFT.II.vec),
    g_adapt: pack(g_adapt), adapt: params.adapt,
    beta_E: params.beta_E, beta_I: params.beta_I
  });

  setTimeout(tick, 0);
}

// ── Message handler ───────────────────────────────────────────────────
self.onmessage = function(e) {
  const d = e.data;
  if (d.type === 'start') {
    pendingParams = d.params; paramsDirty = true;
    // Always re-seed state on start
    r_E = null;
    running = true;
    tick();
  } else if (d.type === 'stop') {
    running = false;
  } else if (d.type === 'params') {
    pendingParams = d.params; paramsDirty = true;
  }
};
</script>

    // Size the box to the widest label

    const boxW = padX * 2 + lineLen + gap + maxText;

let phaseAcc = null;       // { EE: { val: Float64Array(NBINS) }, ... }  EWMA of per-bin metric
// bin b has |Δφ| center = (b + 0.5)·π/NBINS;  similarity = (π − |Δφ|)/π = 1 − (b + 0.5)/NBINS
const _binCenters = Array.from({length: NBINS}, (_, i) => 1 - (i + 0.5) / NBINS);
const EWMA_ALPHA = 0.1;    // 0..1; larger = more reactive, less smooth

function resetPhaseAcc() {
  phaseAcc = {};
  for (const k of ['EE','EI','IE','II']) {
    const val = new Float64Array(NBINS);
    val.fill(NaN);
    phaseAcc[k] = { val };
  }
  PHASE_ORDER.forEach((tk, i) => {
    phaseChart.data.datasets[i].data = _binCenters.map(x => ({ x, y: NaN }));
  });
  phaseChart.update('none');
}
resetPhaseAcc();

function computePhases(r, n) {
  // Naive DFT over k = 1..n/2, pick mode with largest magnitude.
  let bestK = 1, bestMag2 = -1, bestRe = 0, bestIm = 0;
  const twoPiOverN = 2 * Math.PI / n;
  const kMax = Math.max(1, Math.floor(n / 2));
  for (let k = 1; k <= kMax; k++) {
    let re = 0, im = 0;
    for (let i = 0; i < n; i++) {
      const a = twoPiOverN * k * i;
      const ri = r[i];
      re += ri * Math.cos(a);
      im += ri * Math.sin(a);
    }
    const m2 = re*re + im*im;
    if (m2 > bestMag2) { bestMag2 = m2; bestK = k; bestRe = re; bestIm = im; }
  }
  if (bestMag2 < 1e-12) return null;  // pattern is silent / undefined
  const theta0 = Math.atan2(bestIm, bestRe);
  const phases = new Float64Array(n);
  const TWO_PI = 2 * Math.PI;
  for (let i = 0; i < n; i++) {
    let p = twoPiOverN * bestK * i - theta0;
    p = ((p % TWO_PI) + TWO_PI) % TWO_PI;
    phases[i] = p;
  }
  return phases;
}

function accumulatePhases(rE, rI, wE_E, wI_E, wE_I, wI_I, n) {
  const phE = computePhases(rE, n);
  const phI = computePhases(rI, n);
  // kernel offset for (post i, pre j): (i - j + ⌊n/2⌋) mod n
  const half = Math.floor(n / 2);
  const TWO_PI = 2 * Math.PI;
  const binsPerPi = NBINS / Math.PI;

  // type → [post phases, pre phases, kernel vec]
  const tps = [
    ['EE', phE, phE, wE_E],
    ['EI', phE, phI, wE_I],
    ['IE', phI, phE, wI_E],
    ['II', phI, phI, wI_I],
  ];
  const sumFrame = new Float64Array(NBINS);
  const cntFrame = new Float64Array(NBINS);
  for (const [tk, post, pre, w] of tps) {
    if (!post || !pre) continue;     // skip if either population silent
    const acc = phaseAcc[tk];

    // If the kernel is identically zero (amp = 0), the average must be 0
    // everywhere — short-circuit instead of letting EWMA decay slowly.
    let kernelZero = true;
    for (let k = 0; k < n; k++) {
      if (w[k] !== 0) { kernelZero = false; break; }
    }
    if (kernelZero) { acc.val.fill(0); continue; }

    sumFrame.fill(0); cntFrame.fill(0);
    for (let i = 0; i < n; i++) {
      const pi = post[i];
      for (let j = 0; j < n; j++) {
        let d = pi - pre[j];
        d = ((d % TWO_PI) + TWO_PI) % TWO_PI;
        if (d > Math.PI) d = TWO_PI - d;
        let b = Math.floor(d * binsPerPi);
        if (b >= NBINS) b = NBINS - 1;
        const off = ((i - j + half) % n + n) % n;
        sumFrame[b] += Math.abs(w[off]);
        cntFrame[b] += 1;
      }
    }
    for (let b = 0; b < NBINS; b++) {
      if (cntFrame[b] > 0) {
        const frameVal = sumFrame[b] / cntFrame[b];   // mean |w| in this bin
        acc.val[b] = Number.isFinite(acc.val[b])
          ? (1 - EWMA_ALPHA) * acc.val[b] + EWMA_ALPHA * frameVal
          : frameVal;
      }
    }
  }
}

// ── True 2D phase (torus) ──────────────────────────────────────────────
// Per-neuron 2D phase (φx, φy) from the dominant x/y activity modes, found on
// the marginal profiles. Phase similarity uses the 2D toroidal phase distance.
const PHASE_SAMPLE = 256;   // sampled grid points → S² pairs per frame

function computePhases2D(r, L) {
  const px = new Float64Array(L), py = new Float64Array(L);
  for (let y = 0; y < L; y++) {
    const off = y * L;
    for (let x = 0; x < L; x++) { const v = r[off + x]; px[x] += v; py[y] += v; }
  }
  return { x: computePhases(px, L), y: computePhases(py, L) };  // each: length-L phase or null
}

function accumulatePhases2D(rE, rI, wEE, wIE, wEI, wII, L) {
  const N = L * L, half = Math.floor(L / 2);
  const TWO_PI = 2 * Math.PI, NORM = Math.PI * Math.SQRT2;  // max 2D phase distance
  const phE = computePhases2D(rE, L), phI = computePhases2D(rI, L);

  // fresh random subsample of grid points each frame (EWMA averages over time)
  const S = Math.min(PHASE_SAMPLE, N);
  const idx = new Int32Array(S);
  for (let k = 0; k < S; k++) idx[k] = (Math.random() * N) | 0;

  const tps = [
    ['EE', phE, phE, wEE],
    ['EI', phE, phI, wEI],
    ['IE', phI, phE, wIE],
    ['II', phI, phI, wII],
  ];
  const sumFrame = new Float64Array(NBINS);
  const cntFrame = new Float64Array(NBINS);
  for (const [tk, post, pre, w] of tps) {
    const acc = phaseAcc[tk];
    if (!post.x || !post.y || !pre.x || !pre.y) continue;   // a population is silent

    let kernelZero = true;
    for (let k = 0; k < N; k++) { if (w[k] !== 0) { kernelZero = false; break; } }
    if (kernelZero) { acc.val.fill(0); continue; }

    sumFrame.fill(0); cntFrame.fill(0);
    for (let a = 0; a < S; a++) {
      const ia = idx[a], xa = ia % L, ya = (ia / L) | 0;
      const pxa = post.x[xa], pya = post.y[ya];
      for (let b = 0; b < S; b++) {
        const ib = idx[b], xb = ib % L, yb = (ib / L) | 0;
        let ddx = pxa - pre.x[xb]; ddx = ((ddx % TWO_PI) + TWO_PI) % TWO_PI; if (ddx > Math.PI) ddx = TWO_PI - ddx;
        let ddy = pya - pre.y[yb]; ddy = ((ddy % TWO_PI) + TWO_PI) % TWO_PI; if (ddy > Math.PI) ddy = TWO_PI - ddy;
        let bin = (Math.sqrt(ddx*ddx + ddy*ddy) / NORM * NBINS) | 0;
        if (bin >= NBINS) bin = NBINS - 1;
        const offx = ((xa - xb + half) % L + L) % L;
        const offy = ((ya - yb + half) % L + L) % L;
        sumFrame[bin] += Math.abs(w[offy * L + offx]);
        cntFrame[bin] += 1;
      }
    }
    for (let bn = 0; bn < NBINS; bn++) {
      if (cntFrame[bn] > 0) {
        const frameVal = sumFrame[bn] / cntFrame[bn];
        acc.val[bn] = Number.isFinite(acc.val[bn])
          ? (1 - EWMA_ALPHA) * acc.val[bn] + EWMA_ALPHA * frameVal
          : frameVal;
      }
    }
  }
}

function updatePhaseCharts() {
  // Shared y-range across all four phase plots
  let yMax = 0;
  for (const tk of ['EE','EI','IE','II']) {
    const v = phaseAcc[tk].val;
    for (let b = 0; b < NBINS; b++) {
      if (Number.isFinite(v[b]) && v[b] > yMax) yMax = v[b];
    }
  }
  const ySharedMax = yMax > 0 ? yMax * 1.1 : 1;

  PHASE_ORDER.forEach((tk, i) => {
    const acc = phaseAcc[tk];
    const pts = new Array(NBINS);
    for (let b = 0; b < NBINS; b++) {
      pts[b] = { x: _binCenters[b], y: acc.val[b] };
    }
    phaseChart.data.datasets[i].data = pts;
  });
  phaseChart.options.scales.y.min = 0;
  phaseChart.options.scales.y.max = ySharedMax;
  phaseChart.update('none');
}

// ── Viridis colormap + heatmap rendering (2D mode) ─────────────────────
const VIRIDIS = [
  [0.00, 68,1,84], [0.13, 71,44,122], [0.25, 59,81,139], [0.38, 44,113,142],
  [0.50, 33,144,141], [0.63, 39,173,129], [0.75, 92,200,99], [0.88, 170,220,50],
  [1.00, 253,231,37],
];
const VLUT = new Uint8Array(256 * 3);
(function buildVLUT() {
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let a = VIRIDIS[0], b = VIRIDIS[VIRIDIS.length - 1];
    for (let j = 1; j < VIRIDIS.length; j++) {
      if (t <= VIRIDIS[j][0]) { a = VIRIDIS[j - 1]; b = VIRIDIS[j]; break; }
    }
    const f = (b[0] - a[0]) > 0 ? (t - a[0]) / (b[0] - a[0]) : 0;
    VLUT[i*3]   = Math.round(a[1] + f * (b[1] - a[1]));
    VLUT[i*3+1] = Math.round(a[2] + f * (b[2] - a[2]));
    VLUT[i*3+2] = Math.round(a[3] + f * (b[3] - a[3]));
  }
})();

function drawHeatmap(canvas, field, L, vmin, vmax) {
  if (canvas.width !== L) canvas.width = L;
  if (canvas.height !== L) canvas.height = L;
  const ctx = canvas._ctx || (canvas._ctx = canvas.getContext('2d'));
  let img = canvas._img;
  if (!img || img.width !== L) img = canvas._img = ctx.createImageData(L, L);
  const data = img.data;
  const range = (vmax > vmin) ? (vmax - vmin) : 1;
  const M = L * L;
  for (let k = 0; k < M; k++) {
    let t = (field[k] - vmin) / range;
    t = t < 0 ? 0 : t > 1 ? 1 : t;
    const idx = (t * 255) | 0, o = k * 4, vo = idx * 3;
    data[o] = VLUT[vo]; data[o+1] = VLUT[vo+1]; data[o+2] = VLUT[vo+2]; data[o+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

// uniform (constant) field → single colour (β_E / β_I panels)
function drawUniform(canvas, value, vmin, vmax) {
  if (canvas.width !== 1) canvas.width = 1;
  if (canvas.height !== 1) canvas.height = 1;
  const ctx = canvas._ctx || (canvas._ctx = canvas.getContext('2d'));
  const range = (vmax > vmin) ? (vmax - vmin) : 1;
  let t = (value - vmin) / range; t = t < 0 ? 0 : t > 1 ? 1 : t;
  const idx = (t * 255) | 0;
  ctx.fillStyle = `rgb(${VLUT[idx*3]},${VLUT[idx*3+1]},${VLUT[idx*3+2]})`;
  ctx.fillRect(0, 0, 1, 1);
}

function fieldRange(f) {
  let lo = Infinity, hi = -Infinity;
  for (let k = 0; k < f.length; k++) { const v = f[k]; if (v < lo) lo = v; if (v > hi) hi = v; }
  return [lo, hi];
}

function centerRow(arr, L) {
  const cy = Math.floor(L / 2), off = cy * L, out = new Array(L);
  for (let x = 0; x < L; x++) out[x] = arr[off + x];
  return out;
}

const HM = {
  E: document.getElementById('hm_E'), I: document.getElementById('hm_I'),
  EE: document.getElementById('hm_g_EE'), EI: document.getElementById('hm_g_EI'),
  IE: document.getElementById('hm_g_IE'), II: document.getElementById('hm_g_II'),
  ga: document.getElementById('hm_g_a'),
};

let currentN = 0, currentDims = 0;
let gaScaleMax = 0;   // peak-hold colour scale for |g_a| (decays slowly)

function updateCharts(d) {
  const is2d = d.dims === 2;
  const L = d.L;
  const wlen = is2d ? L : d.n;   // weights line uses a centre-row slice in 2D

  if (wlen !== currentN || d.dims !== currentDims) {
    currentN = wlen; currentDims = d.dims;
    const labels = Array.from({length: wlen}, (_, i) => i + 1);
    const wch = [charts[0]].concat(is2d ? [] : [charts[1], charts[2]]);
    for (const ch of wch) {
      ch.data.labels = labels;
      ch.options.scales.x.min = 1;
      ch.options.scales.x.max = wlen;
    }
    resetPhaseAcc();
  }

  // Weights plot (line in both modes; centre-row slice of the 2D kernel in 2D)
  const w = is2d
    ? [centerRow(d.w_EE,L), centerRow(d.w_IE,L), centerRow(d.w_EI,L), centerRow(d.w_II,L)]
    : [d.w_EE, d.w_IE, d.w_EI, d.w_II];
  for (let di = 0; di < 4; di++) charts[0].data.datasets[di].data = w[di];
  charts[0].update('none');

  if (is2d) {
    // Firing-rate heatmaps (E, I share a [0, max] scale)
    let rmax = 0;
    for (let k = 0; k < d.r_E.length; k++) {
      if (d.r_E[k] > rmax) rmax = d.r_E[k];
      if (d.r_I[k] > rmax) rmax = d.r_I[k];
    }
    drawHeatmap(HM.E, d.r_E, L, 0, rmax);
    drawHeatmap(HM.I, d.r_I, L, 0, rmax);

    // Each g_* panel auto-scales independently to its own min/max.
    let r;
    r = fieldRange(d.g_EE); drawHeatmap(HM.EE, d.g_EE, L, r[0], r[1]);
    r = fieldRange(d.g_EI); drawHeatmap(HM.EI, d.g_EI, L, r[0], r[1]);
    r = fieldRange(d.g_IE); drawHeatmap(HM.IE, d.g_IE, L, r[0], r[1]);
    r = fieldRange(d.g_II); drawHeatmap(HM.II, d.g_II, L, r[0], r[1]);
    // |g_a|: its shape barely changes while amplitude drifts slowly, so a
    // per-frame min/max would divide the amplitude out and render identical
    // frames (looks "stuck"). Use a slowly-decaying peak-hold scale instead.
    const ga = new Float32Array(L * L);
    let gmax = 0;
    if (d.adapt) for (let k = 0; k < ga.length; k++) {
      const v = Math.abs(d.g_adapt[k]); ga[k] = v; if (v > gmax) gmax = v;
    }
    gaScaleMax = Math.max(gmax, gaScaleMax * 0.97);
    drawHeatmap(HM.ga, ga, L, 0, gaScaleMax || 1);

    // True 2D phase similarity over the torus
    accumulatePhases2D(d.r_E, d.r_I, d.w_EE, d.w_IE, d.w_EI, d.w_II, L);
  } else {
    const betaE = new Array(d.n).fill(d.beta_E);
    const betaI = new Array(d.n).fill(d.beta_I);
    const gAdapt = d.adapt ? d.g_adapt : [];   // empty → not drawn / not in legend
    const payloads = [
      [d.r_E, d.r_I],
      [d.g_EE, d.g_EI, d.g_IE, d.g_II, betaE, betaI, gAdapt],
    ];
    for (let ci = 0; ci < 2; ci++) {
      const ch = charts[ci + 1];
      for (let di = 0; di < ch.data.datasets.length; di++) {
        ch.data.datasets[di].data = payloads[ci][di];
      }
      ch.update('none');
    }
    accumulatePhases(d.r_E, d.r_I, d.w_EE, d.w_IE, d.w_EI, d.w_II, d.n);
  }

  updatePhaseCharts();
}

const src = document.getElementById('worker-src').textContent;

// ── Presets ───────────────────────────────────────────────────────────
// Shared presets live in presets.json in the repo. Everyone reads that file
// (no auth). The repo owner can paste a fine-grained PAT (Contents r/w on this
// repo only); it is kept solely in their browser's localStorage and is used to
// commit the file via the GitHub API on Save/Delete. Visitors without a token
// only ever read — their Save/Delete stay local to their browser.
const PRESET_STORAGE_KEY = 'ring_attractor_presets';
const GH_TOKEN_KEY = 'ring_attractor_gh_token';
const GH_OWNER = 'johnwidloski';
const GH_REPO = 'RingAttractor';
const GH_BRANCH = 'main';
const GH_PATH = 'presets.json';
const GH_API = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
const SHARED_URL = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${GH_PATH}`;
const presets = {};

// base64 <-> UTF-8 string (GitHub Contents API uses base64)
const b64encode = str => btoa(unescape(encodeURIComponent(str)));

const getToken = () => localStorage.getItem(GH_TOKEN_KEY) || '';
function setPresetStatus(msg) {
  const el = document.getElementById('preset_status');
  if (el) el.textContent = msg || '';
}

// Fetch the shared presets committed to the repo and merge them in. Local
// presets (from this browser's previous saves) take precedence on name clash.
async function loadSharedPresets() {
  try {
    const res = await fetch(SHARED_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;  // 404 until presets.json is first committed
    const shared = await res.json();
    if (shared && typeof shared === 'object') {
      for (const k of Object.keys(shared)) {
        if (!(k in presets)) presets[k] = shared[k];
      }
      renderPresets();
    }
  } catch (err) {
    console.warn('Failed to load shared presets:', err);
  }
}

// Commit the current preset set to the repo (owner only — no-op without token).
async function commitPresets() {
  const token = getToken();
  if (!token) return;
  setPresetStatus('Committing…');
  try {
    const hdr = { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' };
    // Need the current file SHA to update it (omit on first-ever create).
    let sha;
    const getRes = await fetch(GH_API + '?ref=' + GH_BRANCH, { headers: hdr, cache: 'no-store' });
    if (getRes.ok) sha = (await getRes.json()).sha;
    const body = {
      message: 'Update presets',
      content: b64encode(JSON.stringify(presets, null, 2)),
      branch: GH_BRANCH,
    };
    if (sha) body.sha = sha;
    const putRes = await fetch(GH_API, { method: 'PUT', headers: hdr, body: JSON.stringify(body) });
    if (!putRes.ok) throw new Error('HTTP ' + putRes.status + ' — ' + (await putRes.text()).slice(0, 200));
    setPresetStatus('Committed ✓ (live for everyone in ~1 min)');
  } catch (err) {
    console.error('Commit failed:', err);
    setPresetStatus('Commit failed — ' + err.message);
  }
}

function persistPresets() {
  try {
    localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(presets));
  } catch (err) {
    console.warn('Failed to persist presets:', err);
  }
}

function restorePresets() {
  try {
    const raw = localStorage.getItem(PRESET_STORAGE_KEY);
    if (!raw) return;
    const loaded = JSON.parse(raw);
    if (loaded && typeof loaded === 'object') Object.assign(presets, loaded);
  } catch (err) {
    console.warn('Failed to restore presets:', err);
  }
}

function loadPreset(p) {
  document.getElementById('use_spiking').checked = !!p.spiking;
  document.getElementById('slow_speed').checked = (p.speed != null && p.speed < 1);
  const n_exp = Math.round(Math.log2(p.n));
  document.getElementById('n_exp').value = n_exp;
  document.getElementById('n_val').textContent = Math.pow(2, n_exp);
  document.getElementById('beta_E').value = p.beta_E;
  document.getElementById('beta_E_val').textContent = p.beta_E;
  document.getElementById('beta_I').value = p.beta_I;
  document.getElementById('beta_I_val').textContent = p.beta_I;
  document.getElementById('sig_env').value = sigToSlider(p.sig_env).toFixed(3);
  document.getElementById('sig_env_v').textContent = fmtSig(p.sig_env);
  // Adaptation (older presets may not include these fields)
  document.getElementById('use_adapt').checked = !!p.adapt;
  const wa = p.w_a != null ? p.w_a : 1;
  document.getElementById('amp_a').value = wa;
  document.getElementById('amp_a_val').textContent = wa;
  const tauA = p.tau_a != null ? p.tau_a : 3.0;
  document.getElementById('tau_a').value = tauA;
  document.getElementById('tau_a_val').textContent = (+tauA).toFixed(1);
  document.getElementById('use_reset').checked = !!p.reset;
  const tr = p.t_reset != null ? p.t_reset : 5;
  document.getElementById('t_reset').value = tr;
  document.getElementById('t_reset_val').textContent = (+tr).toFixed(1);
  // Reset-pulse shape (older presets may not include these fields)
  const psig = p.pulse_sig_frac != null ? p.pulse_sig_frac : 0.0625;
  document.getElementById('pulse_sig').value = psig;
  document.getElementById('pulse_sig_val').textContent = (+psig).toFixed(3);
  const pamp = p.pulse_amp != null ? p.pulse_amp : 500;
  document.getElementById('pulse_amp').value = pamp;
  document.getElementById('pulse_amp_val').textContent = pamp;
  const pdurMs = Math.round((p.pulse_dur != null ? p.pulse_dur : 0.050) * 1000);
  document.getElementById('pulse_dur').value = pdurMs;
  document.getElementById('pulse_dur_val').textContent = pdurMs + 'ms';
  for (const r of WT_ROWS) {
    const sig = p['sig_'+r.id];
    document.getElementById('sig_'+r.id).value = sigToSlider(sig).toFixed(3);
    document.getElementById('sig_'+r.id+'_v').textContent = fmtSig(sig);
    const ampSigned = p['amp_'+r.id];
    const ampRaw = r.negAmp ? -ampSigned : ampSigned;
    document.getElementById('amp_'+r.id).value = ampRaw;
    document.getElementById('amp_'+r.id+'_v').textContent = r.negAmp ? -ampRaw : ampRaw;
    document.getElementById('inv_'+r.id).checked = !!p['inv_'+r.id];
    document.getElementById('bin_'+r.id).checked = !!p['bin_'+r.id];
  }
  const twoD = p.dims === 2;
  document.getElementById('use_2d').checked = twoD;
  setMode(twoD);   // swaps layout + calls sendParams
}

function renderPresets() {
  const list = document.getElementById('preset_list');
  list.innerHTML = '';
  for (const name of Object.keys(presets)) {
    const row = document.createElement('div');
    row.className = 'preset-row';
    const loadBtn = document.createElement('button');
    loadBtn.textContent = name;
    loadBtn.className = 'preset-btn';
    loadBtn.title = 'Load ' + name;
    loadBtn.addEventListener('click', () => loadPreset(presets[name]));
    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.className = 'preset-del';
    delBtn.title = 'Delete ' + name;
    delBtn.addEventListener('click', () => {
      delete presets[name];
      persistPresets();
      renderPresets();
      commitPresets();
    });
    row.appendChild(loadBtn);
    row.appendChild(delBtn);
    list.appendChild(row);
  }
}

document.getElementById('preset_save').addEventListener('click', () => {
  const nameInput = document.getElementById('preset_name');
  const nm = nameInput.value.trim();
  if (!nm) return;
  presets[nm] = getParams();
  nameInput.value = '';
  persistPresets();
  renderPresets();
  commitPresets();
});

document.getElementById('preset_name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('preset_save').click();
});

// Admin: set/clear the GitHub token (owner only). No dedicated button — click
// the "Presets" header to paste it once. Stored in localStorage on this
// machine only; never committed, never in page source.
function updateAdminUI() {
  if (getToken()) setPresetStatus('Committing enabled — Save/Delete push to the repo.');
}
document.getElementById('presets_title').addEventListener('click', () => {
  const cur = getToken();
  const next = prompt(
    'GitHub fine-grained token (Contents: read/write on ' + GH_OWNER + '/' + GH_REPO + ').\n' +
    'Leave blank and OK to clear it. Stored only in this browser.',
    cur);
  if (next === null) return;              // cancelled
  const t = next.trim();
  if (t) { localStorage.setItem(GH_TOKEN_KEY, t); setPresetStatus('Token saved — committing enabled.'); }
  else { localStorage.removeItem(GH_TOKEN_KEY); setPresetStatus('Token cleared — read-only.'); }
});

restorePresets();
renderPresets();
updateAdminUI();
loadSharedPresets();   // pull the committed presets everyone shares

// ── Keep the combined mean-weight plot square ──────────────────────────
// Match its height to the Weights plot and set width equal to that height,
// so the panel is always square and sits flush beside the Weights plot.
function sizePhaseSquare() {
  const wWrap = document.getElementById('weights-wrap');
  const wrap = document.getElementById('phase-wrap');
  const side = wWrap.clientHeight;   // match the Weights plot's height → square
  if (side > 0) {
    wrap.style.height = side + 'px';
    wrap.style.width = side + 'px';
    phaseChart.resize();
  }
}

window.addEventListener('resize', sizePhaseSquare);
requestAnimationFrame(sizePhaseSquare);
</script>
