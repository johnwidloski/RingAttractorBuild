<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ring Attractor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 16px;
}

/* ── Left panel ─────────────────────────────────────────────── */
#controls {
  width: 555px;
  min-width: 510px;
  background: #161b22;
  border-right: 1px solid #30363d;
  padding: 12px 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Right panel ─────────────────────────────────────────────── */
#plots {
  flex: 1;
  display: flex;
  flex-direction: row;
  padding: 6px 6px 6px 8px;
  gap: 8px;
  overflow: hidden;
  background: #0d1117;
}
#plots-left, #plots-right {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
  overflow: hidden;
}
#plots-left  { flex: 1; min-width: 0; }
#plots-right { width: 280px; flex-shrink: 0; }
#phase-controls {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 4px;
  font-size: 12px;
  color: #8b949e;
}
.plot-wrap { flex: 1; position: relative; min-height: 0; }

/* ── Start / Stop button ─────────────────────────────────────── */
#startstop {
  width: 100%;
  padding: 9px 0;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}
#startstop.running {
  background: #b91c1c;
  color: #fecaca;
}
#startstop.stopped {
  background: #15803d;
  color: #bbf7d0;
}
#resetbtn {
  width: 100%;
  padding: 9px 0;
  border: 1px solid #30363d;
  border-radius: 6px;
  background: #21262d;
  color: #8b949e;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}
#resetbtn:hover {
  background: #30363d;
  color: #c9d1d9;
}

/* ── Section headers ─────────────────────────────────────────── */
.sec-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #58a6ff;
  border-bottom: 1px solid #21262d;
  padding-bottom: 4px;
  margin-bottom: 8px;
}

/* ── Generic control row ─────────────────────────────────────── */
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.lbl {
  color: #8b949e;
  white-space: nowrap;
  min-width: 70px;
  font-size: 15px;
}

/* ── Range sliders ───────────────────────────────────────────── */
input[type=range] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #21262d;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #58a6ff;
  cursor: pointer;
}
.sval {
  font-size: 13px;
  color: #6e7681;
  min-width: 42px;
  text-align: right;
}

/* ── Toggle switches ─────────────────────────────────────────── */
.tog { position: relative; display: inline-block; width: 32px; height: 18px; }
.tog input { opacity: 0; width: 0; height: 0; }
.tog-track {
  position: absolute; cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #21262d; border-radius: 18px; transition: .2s;
}
.tog-track::before {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  left: 3px; bottom: 3px;
  background: #6e7681;
  border-radius: 50%;
  transition: .2s;
}
input:checked ~ .tog-track { background: #238636; }
input:checked ~ .tog-track::before {
  transform: translateX(14px);
  background: #3fb950;
}

/* ── Weights table ───────────────────────────────────────────── */
.wt { width: 100%; border-collapse: collapse; }
.wt th {
  font-size: 12px; color: #6e7681;
  text-align: center; padding: 2px 2px 5px;
  font-weight: 400;
}
.wt th:first-child { text-align: left; }
.wt td { padding: 4px 3px; vertical-align: middle; }
.wt td:first-child {
  font-size: 14px; color: #8b949e;
  white-space: nowrap; padding-right: 6px;
}
.wt td input[type=range] { width: 100%; min-width: 50px; }
.wt .sval { min-width: 36px; font-size: 12px; }

/* ── Presets ─────────────────────────────────────────────────── */
input[type=text]#preset_name {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 4px;
  color: #c9d1d9;
  padding: 6px 8px;
  font-size: 14px;
  outline: none;

  padding: 6px 10px;
  border: 1px solid #30363d;
  border-radius: 4px;
  background: #21262d;
  color: #c9d1d9;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  white-space: nowrap;

  border-radius: 4px;
  background: #21262d;
  color: #8b949e;
  font-size: 13px;
  cursor: pointer;
}

<!-- ══ Worker source (not executed directly) ════════════════════ -->
<script id="worker-src" type="text/plain">

// ── FFT (Cooley-Tukey, power-of-2) ───────────────────────────────────
function fft(re, im) {
  const n = re.length;
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      let t = re[i]; re[i] = re[j]; re[j] = t;
      t = im[i]; im[i] = im[j]; im[j] = t;
    }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wRe = Math.cos(ang), wIm = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let cRe = 1, cIm = 0;
      for (let k = 0; k < (len >> 1); k++) {
        const p = i + k, q = p + (len >> 1);
        const uRe = re[p], uIm = im[p];
        const vRe = re[q]*cRe - im[q]*cIm;
        const vIm = re[q]*cIm + im[q]*cRe;
        re[p] = uRe+vRe; im[p] = uIm+vIm;
        re[q] = uRe-vRe; im[q] = uIm-vIm;
        const nr = cRe*wRe - cIm*wIm;
        cIm = cRe*wIm + cIm*wRe; cRe = nr;
      }
    }
  }
}

function ifft(re, im) {
  const n = im.length;
  for (let i = 0; i < n; i++) im[i] = -im[i];
  fft(re, im);
  for (let i = 0; i < n; i++) { re[i] /= n; im[i] = -im[i] / n; }
}

function fftshift(arr) {
  const n = arr.length, s = Math.floor(n / 2);
  const r = new Float64Array(n);
  for (let i = 0; i < n - s; i++) r[i] = arr[i + s];
  for (let i = 0; i < s; i++) r[n - s + i] = arr[i];
  return r;
}

// ── Simulation state ──────────────────────────────────────────────────
let N = 0, params = null;
let r_E = null, r_I = null;
let wFT = {};       // { EE, IE, EI, II } each { re, im, vec }
let wkRe, wkIm;    // reusable FFT work buffers
// pre-alloc output buffers
let g_EE, g_IE, g_EI, g_II, G_E, G_I;

let running = false;
let pendingParams = null, paramsDirty = false;

const dt = 0.5 / 1000;
const tau_s = 30 / 1000;
const STEPS_PER_TICK = 200;   // simulation steps between UI posts

// ── Weight helpers ────────────────────────────────────────────────────
function makeWeightVec(n, sig, amp, inv, bin) {
  const w = new Float64Array(n);
  const ctr = (Math.floor(n / 2) + 1) / n;
  let mx = 0;
  for (let i = 0; i < n; i++) {
    const d = ((i + 1) / n - ctr) / sig;
    w[i] = Math.exp(-0.5 * d * d);
    if (w[i] > mx) mx = w[i];
  }
  for (let i = 0; i < n; i++) {
    w[i] /= mx;
    if (inv) w[i] = 1 - w[i];
    if (bin) w[i] = w[i] >= 0.5 ? 1 : 0;
    w[i] *= amp;
  }
  return w;
}

function computeWeightFT(w) {
  const n = w.length;
  const ws = fftshift(w);
  const re = new Float64Array(ws);
  const im = new Float64Array(n);
  fft(re, im);
  return { re, im };
}

function initWeights(p, n) {
  const env = makeWeightVec(n, p.sig_env, 1.0, false, false);
  for (const nm of ['EE','EI','IE','II']) {
    const vec = makeWeightVec(n, p['sig_'+nm], p['amp_'+nm], p['inv_'+nm], p['bin_'+nm]);
    for (let i = 0; i < n; i++) vec[i] *= env[i];
    const ft  = computeWeightFT(vec);
    wFT[nm] = { re: ft.re, im: ft.im, vec };
  }
}

function allocBuffers(n) {
  wkRe = new Float64Array(n); wkIm = new Float64Array(n);
  g_EE = new Float64Array(n); g_IE = new Float64Array(n);
  g_EI = new Float64Array(n); g_II = new Float64Array(n);
  G_E  = new Float64Array(n); G_I  = new Float64Array(n);
  r_E  = new Float64Array(n); r_I  = new Float64Array(n);
  r_E[Math.max(0, Math.floor(n / 2) - 1)] = 1; // seed bump
}

function applyParams(p) {
  const newN = p.n;
  const resize = newN !== N;
  N = newN;
  initWeights(p, N);
  if (resize || r_E === null) allocBuffers(N);
  params = p;
}

// ── Convolution (in-place, uses wkRe/wkIm) ───────────────────────────
// writes result real-part into `out`
function circConvInto(sig, kRe, kIm, out) {
  out.set(sig);
  wkIm.fill(0);
  fft(out, wkIm);
  for (let i = 0; i < N; i++) {
    const a = out[i], b = wkIm[i], c = kRe[i], d = kIm[i];
    out[i] = a*c - b*d; wkIm[i] = a*d + b*c;
  }
  ifft(out, wkIm);
}

// ── Poisson sampler ───────────────────────────────────────────────────
function poissonSample(lam) {
  if (lam <= 0) return 0;
  if (lam > 20) {
    // Normal approximation
    const u = Math.random(), v = Math.random();
    const z = Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
    return Math.max(0, Math.round(lam + Math.sqrt(lam) * z));
  }
  const L = Math.exp(-lam); let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

// ── Main simulation tick ──────────────────────────────────────────────
function tick() {
  if (!running) return;

  if (paramsDirty && pendingParams) {
    applyParams(pendingParams);
    pendingParams = null; paramsDirty = false;
  }
  if (!r_E) { setTimeout(tick, 10); return; }

  const sp = params.spiking;

  for (let s = 0; s < STEPS_PER_TICK; s++) {
    circConvInto(r_E, wFT.EE.re, wFT.EE.im, g_EE);
    circConvInto(r_E, wFT.IE.re, wFT.IE.im, g_IE);
    circConvInto(r_I, wFT.EI.re, wFT.EI.im, g_EI);
    circConvInto(r_I, wFT.II.re, wFT.II.im, g_II);

    const bE = params.beta_E, bI = params.beta_I;
    for (let i = 0; i < N; i++) {
      G_E[i] = g_EE[i] + g_EI[i] + bE;
      G_I[i] = g_IE[i] + g_II[i] + bI;
    }
    for (let i = 0; i < N; i++) {
      const fE = G_E[i] > 0 ? G_E[i] : 0;
      const fI = G_I[i] > 0 ? G_I[i] : 0;
      const sE = sp ? poissonSample(fE * dt) : fE * dt;
      const sI = sp ? poissonSample(fI * dt) : fI * dt;
      r_E[i] += sE - r_E[i] * dt / tau_s;
      r_I[i] += sI - r_I[i] * dt / tau_s;
    }
  }

  // Divergence guard: reset if NaN/Inf
  let ok = true;
  for (let i = 0; i < N; i++) {
    if (!isFinite(r_E[i]) || !isFinite(r_I[i])) { ok = false; break; }
  }
  if (!ok) allocBuffers(N);

  self.postMessage({
    type: 'update', n: N,
    r_E:  Array.from(r_E),  r_I:  Array.from(r_I),
    g_EE: Array.from(g_EE), g_IE: Array.from(g_IE),
    g_EI: Array.from(g_EI), g_II: Array.from(g_II),
    G_E:  Array.from(G_E),  G_I:  Array.from(G_I),
    w_EE: Array.from(wFT.EE.vec), w_IE: Array.from(wFT.IE.vec),
    w_EI: Array.from(wFT.EI.vec), w_II: Array.from(wFT.II.vec),
    beta_E: params.beta_E, beta_I: params.beta_I
  });

  setTimeout(tick, 0);
}

// ── Message handler ───────────────────────────────────────────────────
self.onmessage = function(e) {
  const d = e.data;
  if (d.type === 'start') {
    pendingParams = d.params; paramsDirty = true;
    // Always re-seed state on start
    r_E = null;
    running = true;
    tick();
  } else if (d.type === 'stop') {
    running = false;
  } else if (d.type === 'params') {
    pendingParams = d.params; paramsDirty = true;
  }
};
</script>

<!-- ══ Main thread ══════════════════════════════════════════════════ -->
<script>
// ── Sigma log-scale helpers (0.01 – 10, 3 decades) ───────────────────
const sigToSlider = s => Math.log10(s / 0.001) / 4;
const sliderToSig = v => 0.001 * Math.pow(10, v * 4);
const fmtSig = s => s < 0.1 ? s.toFixed(3) : s < 1 ? s.toFixed(2) : s.toFixed(1);

// ── Weight row config ─────────────────────────────────────────────────
const WT_ROWS = [
  { id:'EE', sigDef:0.04, ampDef:0, ampMin:0, ampMax:50, negAmp:false, invDef:false, binDef:false },
  { id:'IE', sigDef:0.04, ampDef:8, ampMin:0, ampMax:50, negAmp:false, invDef:false, binDef:false },
  { id:'EI', sigDef:0.04, ampDef:8, ampMin:0, ampMax:50, negAmp:true,  invDef:true,  binDef:false },
  { id:'II', sigDef:0.04, ampDef:0, ampMin:0, ampMax:50, negAmp:true,  invDef:true,  binDef:false },
];
const SIG_ENV_DEF = 10;

// Build weight table rows
const tbody = document.getElementById('wtbody');
for (const r of WT_ROWS) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>w_${r.id}</td>
    <td><input type="range" id="sig_${r.id}" min="0" max="1" step="0.001" value="${sigToSlider(r.sigDef).toFixed(3)}"></td>
    <td><span class="sval" id="sig_${r.id}_v">${fmtSig(r.sigDef)}</span></td>
    <td><input type="range" id="amp_${r.id}" min="${r.ampMin}" max="${r.ampMax}" step="1" value="${r.ampDef}"></td>
    <td><span class="sval" id="amp_${r.id}_v">${r.negAmp ? -r.ampDef : r.ampDef}</span></td>
    <td style="text-align:center">
      <label class="tog"><input type="checkbox" id="inv_${r.id}" ${r.invDef?'checked':''}>
      <span class="tog-track"></span></label>
    </td>
    <td style="text-align:center">
      <label class="tog"><input type="checkbox" id="bin_${r.id}" ${r.binDef?'checked':''}>
      <span class="tog-track"></span></label>
    </td>`;
  tbody.appendChild(tr);
}

// ── Chart helpers ─────────────────────────────────────────────────────
const BLUE = '#4c9be8', RED = '#e06c75';

function ds(label, color, dash) {
  return {
    label, data: [],
    borderColor: color, backgroundColor: 'transparent',
    borderWidth: 1.5, borderDash: dash,
    pointRadius: 0, tension: 0
  };
}

// Custom plugin: draws a line-style legend to the right of the plot area,
// respecting each dataset's borderDash pattern.
const lineLegendPlugin = {
  id: 'lineLegend',
  afterDraw(chart) {
    const { ctx, chartArea, data } = chart;
    if (!chartArea) return;
    const dsets = data.datasets;
    const lineLen = 22, gap = 5, rowH = 15;
    const totalH = dsets.length * rowH;
    const x0 = chartArea.right + 10;
    let y = (chartArea.top + chartArea.bottom) / 2 - totalH / 2 + rowH / 2;

    ctx.save();
    ctx.font = '13px "Segoe UI", system-ui, sans-serif';
    ctx.textBaseline = 'middle';

    for (let i = 0; i < dsets.length; i++) {
      const d = dsets[i];
      const alpha = chart.isDatasetVisible(i) ? 1 : 0.35;
      ctx.globalAlpha = alpha;

      // Draw line segment
      ctx.strokeStyle = d.borderColor;
      ctx.lineWidth = d.borderWidth || 1.5;
      ctx.lineCap = 'round';
      ctx.setLineDash(d.borderDash || []);
      ctx.beginPath();
      ctx.moveTo(x0, y);
      ctx.lineTo(x0 + lineLen, y);
      ctx.stroke();

      // Draw label
      ctx.setLineDash([]);
      ctx.fillStyle = '#8b949e';
      ctx.fillText(d.label, x0 + lineLen + gap, y);

      y += rowH;
    }
    ctx.restore();
  }
};

function mkChart(id, title, datasets, xlabel) {
  return new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets },
    options: {
      animation: false,
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { right: 72 } },
      plugins: {
        title: { display: false },
        legend: { display: false },
      },
      scales: {
        x: {
          min: 1, max: 128,
          title: { display: !!xlabel, text: xlabel || '', color: '#8b949e', font: { size: 13 } },
          ticks: { color: '#6e7681', maxTicksLimit: 8, font: { size: 12 } },
          grid: { color: '#21262d' }
        },
        y: {
          title: { display: true, text: title, color: '#8b949e', font: { size: 13 } },
          ticks: { color: '#6e7681', font: { size: 12 } },
          grid: { color: '#21262d' }
        }
      }
    },
    plugins: [lineLegendPlugin],
  });
}

const charts = [
  mkChart('c1', 'Weights', [
    ds('w_EE', BLUE, []),
    ds('w_IE', BLUE, [3,4]),
    ds('w_EI', RED,  [3,4]),
    ds('w_II', RED,  []),
  ]),
  mkChart('c2', 'Firing rates', [
    ds('E', BLUE, []),
    ds('I', RED,  []),
  ]),
  mkChart('c4', 'Inputs', [
    ds('g_EE', BLUE, []),
    ds('g_EI', BLUE, [3,4]),
    ds('g_IE', RED,  [3,4]),
    ds('g_II', RED,  []),
    ds('β_E',  BLUE, [8,4]),
    ds('β_I',  RED,  [8,4]),
  ], 'Neuron'),
];

// ── Phase-difference vs weight (small column on the right) ─────────────
const NBINS = 30;
// Match the Weights plot: source-pop colour, cross-pop dashed
const PHASE_STYLES = {
  EE: { color: BLUE, dash: []     },
  IE: { color: BLUE, dash: [3, 4] },
  EI: { color: RED,  dash: [3, 4] },
  II: { color: RED,  dash: []     },
};
let phaseBinarize = false; // false: mean |w| ; true: count of pairs with |w| > 1
const BIN_WEIGHT_THRESH = 1e-3;
function phaseYLabel(tk) {
  return phaseBinarize ? `# conn ${tk}` : `⟨w_${tk}⟩`;
}

function mkPhaseChart(id, label, color, dash) {
  return new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets: [{
      label, data: [],
      borderColor: color, backgroundColor: 'transparent',
      borderWidth: 1.5, borderDash: dash,
      pointRadius: 0, tension: 0, spanGaps: false,
    }] },
    options: {
      animation: false,
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { right: 8, top: 4 } },
      plugins: { title: { display: false }, legend: { display: false } },
      scales: {
        x: {
          type: 'linear', min: 0, max: 1,
          title: { display: true, text: 'phase similarity', color: '#8b949e', font: { size: 11 } },
          ticks: { color: '#6e7681', maxTicksLimit: 4, font: { size: 10 },
                   callback: v => v.toFixed(2) },
          grid: { color: '#21262d' }
        },
        y: {
          title: { display: true, text: phaseYLabel(label), color: '#8b949e', font: { size: 11 } },
          ticks: { color: '#6e7681', font: { size: 10 },
                   callback: v => {
                     const a = Math.abs(v);
                     if (a < 1e-6) return '0';
                     if (a < 0.01 || a >= 1000) return v.toExponential(1);
                     return v.toFixed(2);
                   } },
          grid: { color: '#21262d' }
        }
      }
    }
  });
}

const phaseCharts = {
  EE: mkPhaseChart('c_EE', 'EE', PHASE_STYLES.EE.color, PHASE_STYLES.EE.dash),
  EI: mkPhaseChart('c_EI', 'EI', PHASE_STYLES.EI.color, PHASE_STYLES.EI.dash),
  IE: mkPhaseChart('c_IE', 'IE', PHASE_STYLES.IE.color, PHASE_STYLES.IE.dash),
  II: mkPhaseChart('c_II', 'II', PHASE_STYLES.II.color, PHASE_STYLES.II.dash),
};

let phaseAcc = null;       // { EE: { val: Float64Array(NBINS) }, ... }  EWMA of per-bin metric
// bin b has |Δφ| center = (b + 0.5)·π/NBINS;  similarity = (π − |Δφ|)/π = 1 − (b + 0.5)/NBINS
const _binCenters = Array.from({length: NBINS}, (_, i) => 1 - (i + 0.5) / NBINS);
const EWMA_ALPHA = 0.1;    // 0..1; larger = more reactive, less smooth

function updatePhaseYLabels() {
  for (const tk of ['EE','EI','IE','II']) {
    const ch = phaseCharts[tk];
    ch.options.scales.y.title.text = phaseYLabel(tk);
    ch.update('none');
  }
}

function resetPhaseAcc() {
  phaseAcc = {};
  for (const k of ['EE','EI','IE','II']) {
    const val = new Float64Array(NBINS);
    val.fill(NaN);
    phaseAcc[k] = { val };
  }
  for (const k of ['EE','EI','IE','II']) {
    const ch = phaseCharts[k];
    ch.data.datasets[0].data = _binCenters.map(x => ({ x, y: NaN }));
    ch.update('none');
  }
}
resetPhaseAcc();

function computePhases(r, n) {
  // Naive DFT over k = 1..n/2, pick mode with largest magnitude.
  let bestK = 1, bestMag2 = -1, bestRe = 0, bestIm = 0;
  const twoPiOverN = 2 * Math.PI / n;
  const kMax = Math.max(1, Math.floor(n / 2));
  for (let k = 1; k <= kMax; k++) {
    let re = 0, im = 0;
    for (let i = 0; i < n; i++) {
      const a = twoPiOverN * k * i;
      const ri = r[i];
      re += ri * Math.cos(a);
      im += ri * Math.sin(a);
    }
    const m2 = re*re + im*im;
    if (m2 > bestMag2) { bestMag2 = m2; bestK = k; bestRe = re; bestIm = im; }
  }
  if (bestMag2 < 1e-12) return null;  // pattern is silent / undefined
  const theta0 = Math.atan2(bestIm, bestRe);
  const phases = new Float64Array(n);
  const TWO_PI = 2 * Math.PI;
  for (let i = 0; i < n; i++) {
    let p = twoPiOverN * bestK * i - theta0;
    p = ((p % TWO_PI) + TWO_PI) % TWO_PI;
    phases[i] = p;
  }
  return phases;
}

function accumulatePhases(rE, rI, wE_E, wI_E, wE_I, wI_I, n) {
  const phE = computePhases(rE, n);
  const phI = computePhases(rI, n);
  // kernel offset for (post i, pre j): (i - j + ⌊n/2⌋) mod n
  const half = Math.floor(n / 2);
  const TWO_PI = 2 * Math.PI;
  const binsPerPi = NBINS / Math.PI;

  // type → [post phases, pre phases, kernel vec]
  const tps = [
    ['EE', phE, phE, wE_E],
    ['EI', phE, phI, wE_I],
    ['IE', phI, phE, wI_E],
    ['II', phI, phI, wI_I],
  ];
  const sumFrame = new Float64Array(NBINS);
  const cntFrame = new Float64Array(NBINS);
  for (const [tk, post, pre, w] of tps) {
    if (!post || !pre) continue;     // skip if either population silent
    const acc = phaseAcc[tk];

    // If the kernel is identically zero (amp = 0), the average must be 0
    // everywhere — short-circuit instead of letting EWMA decay slowly.
    let kernelZero = true;
    for (let k = 0; k < n; k++) {
      if (w[k] !== 0) { kernelZero = false; break; }
    }
    if (kernelZero) { acc.val.fill(0); continue; }

    sumFrame.fill(0); cntFrame.fill(0);
    const bin = phaseBinarize;
    for (let i = 0; i < n; i++) {
      const pi = post[i];
      for (let j = 0; j < n; j++) {
        let d = pi - pre[j];
        d = ((d % TWO_PI) + TWO_PI) % TWO_PI;
        if (d > Math.PI) d = TWO_PI - d;
        let b = Math.floor(d * binsPerPi);
        if (b >= NBINS) b = NBINS - 1;
        const off = ((i - j + half) % n + n) % n;
        const wv = Math.abs(w[off]);
        sumFrame[b] += bin ? (wv > BIN_WEIGHT_THRESH ? 1 : 0) : wv;
        cntFrame[b] += 1;
      }
    }
    for (let b = 0; b < NBINS; b++) {
      if (cntFrame[b] > 0) {
        // binarize → raw EWMA of per-frame count; otherwise → mean |w|
        const frameVal = bin ? sumFrame[b] : (sumFrame[b] / cntFrame[b]);
        acc.val[b] = Number.isFinite(acc.val[b])
          ? (1 - EWMA_ALPHA) * acc.val[b] + EWMA_ALPHA * frameVal
          : frameVal;
      }
    }
  }
}

function updatePhaseCharts() {
  // Shared y-range across all four phase plots
  let yMax = 0;
  for (const tk of ['EE','EI','IE','II']) {
    const v = phaseAcc[tk].val;
    for (let b = 0; b < NBINS; b++) {
      if (Number.isFinite(v[b]) && v[b] > yMax) yMax = v[b];
    }
  }
  const ySharedMax = yMax > 0 ? yMax * 1.1 : 1;

  for (const tk of ['EE','EI','IE','II']) {
    const ch = phaseCharts[tk];
    const acc = phaseAcc[tk];
    const pts = new Array(NBINS);
    for (let b = 0; b < NBINS; b++) {
      pts[b] = { x: _binCenters[b], y: acc.val[b] };
    }
    ch.data.datasets[0].data = pts;
    ch.options.scales.y.min = 0;
    ch.options.scales.y.max = ySharedMax;
    ch.update('none');
  }
}

let currentN = 0;

function updateCharts(d) {
  if (d.n !== currentN) {
    currentN = d.n;
    const labels = Array.from({length: d.n}, (_, i) => i + 1);
    for (const ch of charts) {
      ch.data.labels = labels;
      ch.options.scales.x.min = 1;
      ch.options.scales.x.max = d.n;
    }
    resetPhaseAcc();
  }
  const betaE = new Array(d.n).fill(d.beta_E);
  const betaI = new Array(d.n).fill(d.beta_I);

  const payloads = [
    [d.w_EE, d.w_IE, d.w_EI, d.w_II],
    [d.r_E, d.r_I],
    [d.g_EE, d.g_EI, d.g_IE, d.g_II, betaE, betaI],
  ];
  for (let ci = 0; ci < charts.length; ci++) {
    const ch = charts[ci];
    for (let di = 0; di < ch.data.datasets.length; di++) {
      ch.data.datasets[di].data = payloads[ci][di];
    }
    ch.update('none');
  }

  accumulatePhases(d.r_E, d.r_I, d.w_EE, d.w_IE, d.w_EI, d.w_II, d.n);
  updatePhaseCharts();
}

// ── Web worker ────────────────────────────────────────────────────────
const src = document.getElementById('worker-src').textContent;
const worker = new Worker(URL.createObjectURL(new Blob([src], { type: 'application/javascript' })));

let pendingUpdate = null;
worker.onmessage = e => { if (e.data.type === 'update') pendingUpdate = e.data; };

(function renderLoop() {
  if (pendingUpdate) { updateCharts(pendingUpdate); pendingUpdate = null; }
  requestAnimationFrame(renderLoop);
})();

// ── Parameter collection ──────────────────────────────────────────────
function getParams() {
  const p = {
    n:       Math.pow(2, +document.getElementById('n_exp').value),
    spiking: document.getElementById('use_spiking').checked,
    beta_E:  +document.getElementById('beta_E').value,
    beta_I:  +document.getElementById('beta_I').value,
    sig_env: sliderToSig(+document.getElementById('sig_env').value),
  };
  for (const r of WT_ROWS) {
    p['sig_'+r.id] = sliderToSig(+document.getElementById('sig_'+r.id).value);
    const ampRaw = +document.getElementById('amp_'+r.id).value;
    p['amp_'+r.id] = r.negAmp ? -ampRaw : ampRaw;
    p['inv_'+r.id] =  document.getElementById('inv_'+r.id).checked;
    p['bin_'+r.id] =  document.getElementById('bin_'+r.id).checked;
  }
  return p;
}

function sendParams() { worker.postMessage({ type: 'params', params: getParams() }); }

// ── Start / Stop ──────────────────────────────────────────────────────
let simRunning = false;

document.getElementById('startstop').addEventListener('click', () => {
  const btn = document.getElementById('startstop');
  if (!simRunning) {
    simRunning = true;
    btn.textContent = 'Stop';
    btn.className = 'running';
    resetPhaseAcc();
    worker.postMessage({ type: 'start', params: getParams() });
  } else {
    simRunning = false;
    btn.textContent = 'Start';
    btn.className = 'stopped';
    worker.postMessage({ type: 'stop' });
  }
});

// ── Wire up all controls ──────────────────────────────────────────────
document.getElementById('use_spiking').addEventListener('change', sendParams);

document.getElementById('phase_binarize').addEventListener('change', e => {
  phaseBinarize = e.target.checked;
  resetPhaseAcc();
  updatePhaseYLabels();
});

document.getElementById('n_exp').addEventListener('input', e => {
  document.getElementById('n_val').textContent = Math.pow(2, +e.target.value);
  sendParams();
});
document.getElementById('beta_E').addEventListener('input', e => {
  document.getElementById('beta_E_val').textContent = e.target.value; sendParams();
});
document.getElementById('beta_I').addEventListener('input', e => {
  document.getElementById('beta_I_val').textContent = e.target.value; sendParams();
});
document.getElementById('sig_env').addEventListener('input', e => {
  document.getElementById('sig_env_v').textContent = fmtSig(sliderToSig(+e.target.value));
  sendParams();
});

for (const r of WT_ROWS) {
  document.getElementById('sig_'+r.id).addEventListener('input', e => {
    document.getElementById('sig_'+r.id+'_v').textContent = fmtSig(sliderToSig(+e.target.value)); sendParams();
  });
  document.getElementById('amp_'+r.id).addEventListener('input', e => {
    const v = +e.target.value;
    document.getElementById('amp_'+r.id+'_v').textContent = r.negAmp ? -v : v; sendParams();
  });
  document.getElementById('inv_'+r.id).addEventListener('change', sendParams);
  document.getElementById('bin_'+r.id).addEventListener('change', sendParams);
}

// ── Presets ───────────────────────────────────────────────────────────
const PRESET_STORAGE_KEY = 'ring_attractor_presets';
const presets = {};

function persistPresets() {
  try {
    localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(presets));
  } catch (err) {
    console.warn('Failed to persist presets:', err);
  }
}

function restorePresets() {
  try {
    const raw = localStorage.getItem(PRESET_STORAGE_KEY);
    if (!raw) return;
    const loaded = JSON.parse(raw);
    if (loaded && typeof loaded === 'object') Object.assign(presets, loaded);
  } catch (err) {
    console.warn('Failed to restore presets:', err);
  }
}

function loadPreset(p) {
  document.getElementById('use_spiking').checked = !!p.spiking;
  const n_exp = Math.round(Math.log2(p.n));
  document.getElementById('n_exp').value = n_exp;
  document.getElementById('n_val').textContent = Math.pow(2, n_exp);
  document.getElementById('beta_E').value = p.beta_E;
  document.getElementById('beta_E_val').textContent = p.beta_E;
  document.getElementById('beta_I').value = p.beta_I;
  document.getElementById('beta_I_val').textContent = p.beta_I;
  document.getElementById('sig_env').value = sigToSlider(p.sig_env).toFixed(3);
  document.getElementById('sig_env_v').textContent = fmtSig(p.sig_env);
  for (const r of WT_ROWS) {
    const sig = p['sig_'+r.id];
    document.getElementById('sig_'+r.id).value = sigToSlider(sig).toFixed(3);
    document.getElementById('sig_'+r.id+'_v').textContent = fmtSig(sig);
    const ampSigned = p['amp_'+r.id];
    const ampRaw = r.negAmp ? -ampSigned : ampSigned;
    document.getElementById('amp_'+r.id).value = ampRaw;
    document.getElementById('amp_'+r.id+'_v').textContent = r.negAmp ? -ampRaw : ampRaw;
    document.getElementById('inv_'+r.id).checked = !!p['inv_'+r.id];
    document.getElementById('bin_'+r.id).checked = !!p['bin_'+r.id];
  }
  sendParams();
}

function renderPresets() {
  const list = document.getElementById('preset_list');
  list.innerHTML = '';
  for (const name of Object.keys(presets)) {
    const row = document.createElement('div');
    row.className = 'preset-row';
    const loadBtn = document.createElement('button');
    loadBtn.textContent = name;
    loadBtn.className = 'preset-btn';
    loadBtn.title = 'Load ' + name;
    loadBtn.addEventListener('click', () => loadPreset(presets[name]));
    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.className = 'preset-del';
    delBtn.title = 'Delete ' + name;
    delBtn.addEventListener('click', () => {
      delete presets[name];
      persistPresets();
      renderPresets();
    });
    row.appendChild(loadBtn);
    row.appendChild(delBtn);
    list.appendChild(row);
  }
}

document.getElementById('preset_save').addEventListener('click', () => {
  const nameInput = document.getElementById('preset_name');
  const nm = nameInput.value.trim();
  if (!nm) return;
  presets[nm] = getParams();
  nameInput.value = '';
  persistPresets();
  renderPresets();
});

document.getElementById('preset_name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('preset_save').click();
});

restorePresets();
renderPresets();
</script>
</body>
